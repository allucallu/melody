<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Melody Maker - Pro Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(22, 33, 62, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 850px;
            margin: 40px 0;
        }

        h2 {
            text-align: center;
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            letter-spacing: 1px;
        }

        .volume-control {
            margin-bottom: 25px;
            background: rgba(15, 52, 96, 0.3);
            border: 1px solid rgba(83, 52, 131, 0.4);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .volume-control label {
            margin-right: 15px;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.95em;
        }

        .volume-control input[type=range] {
            flex-grow: 1;
            margin-right: 20px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .volume-control input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #00d2ff;
            cursor: pointer;
            box-shadow: 0 0 12px #00d2ff;
            transition: 0.2s;
        }

        .volume-control input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .volume-control span {
            min-width: 55px;
            text-align: right;
            font-family: 'Courier New', monospace;
            color: #00d2ff;
            font-weight: bold;
            background: rgba(0, 210, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .track-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .track {
            background: rgba(15, 52, 96, 0.3);
            border: 1px solid rgba(83, 52, 131, 0.5);
            padding: 20px;
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .track:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 210, 255, 0.6);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.08);
            background: rgba(15, 52, 96, 0.45);
        }

        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .track-header label {
            color: #00d2ff;
            font-size: 0.9em;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .track-select {
            width: 130px;
            padding: 6px 10px;
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: #fff;
            border-radius: 6px;
            font-size: 0.8em;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        .track-select:focus, .track-select:hover {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .collapsible {
            display: none;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed rgba(83, 52, 131, 0.8);
            border-radius: 8px;
            text-align: right;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .json-input {
            width: 100%;
            height: 100px;
            background: rgba(15, 12, 41, 0.8);
            border: 1px solid #533483;
            color: #a8b2d1;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.75em;
            resize: vertical;
            margin-bottom: 8px;
            outline: none;
            transition: 0.3s;
        }

        .json-input:focus {
            border-color: #e94560;
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.3);
            color: #fff;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.75em;
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: 0.3s;
        }

        .btn-small:hover {
            background: #00d2ff;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .track > textarea {
            width: 100%;
            height: 75px;
            background: rgba(15, 12, 41, 0.6);
            border: 1px solid rgba(83, 52, 131, 0.6);
            color: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            transition: 0.3s;
        }

        .track > textarea:focus {
            border-color: #00d2ff;
            background: rgba(15, 12, 41, 0.8);
            box-shadow: inset 0 0 8px rgba(0, 210, 255, 0.1);
        }

        .hint {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 25px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #00d2ff;
        }

        .btn-play {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #e94560, #ff4d6d);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
            margin-top: 5px;
        }

        .btn-play:hover {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.6);
        }

        .btn-play:active {
            transform: translateY(1px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #00d2ff;
            font-weight: 600;
            height: 20px;
        }

        /* --- RESPONSIVE MOBILE FIX --- */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                display: block; /* Hindari pemotongan tinggi layar */
            }
            .container {
                width: 100%;
                margin: 10px 0;
                padding: 20px;
                border: none;
            }
            .track-grid {
                grid-template-columns: 1fr; /* Jadi satu kolom tegak */
                gap: 15px;
            }
            .track-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .track-select {
                width: 100%;
                padding: 10px;
                font-size: 0.9em;
            }
            h2 {
                font-size: 1.8rem;
                margin-bottom: 20px;
            }
            .volume-control {
                flex-wrap: wrap; /* Tuas slider tidak terjepit */
            }
            .volume-control input[type=range] {
                width: 100%;
                margin-top: 10px;
                margin-bottom: 10px;
            }
            .volume-control span {
                margin-left: auto;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Melody Studio</h2>

        <div class="volume-control">
            <label>Master Volume:</label>
            <input type="range" id="masterVolume" min="-30" max="0" value="-5" oninput="changeVolume()">
            <span id="volLabel">-5 dB</span>
        </div>

        <div class="track-grid">
            <!-- 1. Melodi -->
            <div class="track">
                <div class="track-header">
                    <label>🎸 Melodi</label>
                    <select class="track-select" id="presetMelody" onchange="changeTrackTheme('Melody')">
                        <option value="cinematic" selected>Cinematic Pad</option>
                        <option value="default">Acoustic Merdu</option>
                        <option value="medieval">Medieval Lute</option>
                        <option value="scifi">Sci-Fi Space</option>
                        <option value="lofi">Lo-Fi Chill</option>
                        <option value="8bit">8-Bit Retro</option>
                        <option value="musicbox">Dreamy Box</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="spooky">Spooky</option>
                        <option value="custom">Custom JSON</option>
                    </select>
                </div>
                <div id="customMelody" class="collapsible">
                    <textarea class="json-input" id="jsonMelody">{"oscillator":{"type":"triangle"},"envelope":{"attack":0.02,"decay":0.1,"sustain":0.3,"release":1}}</textarea>
                    <button class="btn-small" onclick="applyCustomTrack('Melody')">Tetapkan</button>
                </div>
                <textarea id="melodyInput">D4:2n A4:4n G4:8n F4:8n E4:4n D4:8n C4:8n D4:2n Bb4:2n F4:4n E4:8n D4:8n C4:4n G4:8n F4:8n E4:2n D4:2n A4:4n G4:8n F4:8n E4:4n D4:8n C4:8n D4:2n Bb4:2n A4:4n G4:4n A4:1m</textarea>
            </div>

            <!-- 2. Chord -->
            <div class="track">
                <div class="track-header">
                    <label>🎹 Chord</label>
                    <select class="track-select" id="presetChord" onchange="changeTrackTheme('Chord')">
                        <option value="cinematic" selected>Cinematic Pad</option>
                        <option value="default">Acoustic Piano</option>
                        <option value="medieval">Medieval Lute</option>
                        <option value="scifi">Sci-Fi Space</option>
                        <option value="lofi">Lo-Fi Chill</option>
                        <option value="8bit">8-Bit Retro</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="spooky">Spooky</option>
                        <option value="custom">Custom JSON</option>
                    </select>
                </div>
                <div id="customChord" class="collapsible">
                    <textarea class="json-input" id="jsonChord">{"oscillator":{"type":"sine"},"envelope":{"attack":0.5,"decay":0.5,"sustain":0.8,"release":2}}</textarea>
                    <button class="btn-small" onclick="applyCustomTrack('Chord')">Tetapkan</button>
                </div>
                <textarea id="chordInput">D3,F3,A3:1m D3,F3,A3:1m Bb2,D3,F3:1m C3,E3,G3:1m D3,F3,A3:1m D3,F3,A3:1m Bb2,D3,F3:1m A2,C#3,E3:1m</textarea>
            </div>

            <!-- 3. Bass -->
            <div class="track">
                <div class="track-header">
                    <label>🎸 Bass</label>
                    <select class="track-select" id="presetBass" onchange="changeTrackTheme('Bass')">
                        <option value="cyberpunk" selected>Cyberpunk Bass</option>
                        <option value="default">Acoustic Bass</option>
                        <option value="scifi">Sci-Fi Synth</option>
                        <option value="lofi">Lo-Fi Subbass</option>
                        <option value="8bit">8-Bit Bass</option>
                        <option value="cinematic">Cinematic Sub</option>
                        <option value="spooky">Spooky Bass</option>
                        <option value="custom">Custom JSON</option>
                    </select>
                </div>
                <div id="customBass" class="collapsible">
                    <textarea class="json-input" id="jsonBass">{"oscillator":{"type":"fatsawtooth"},"envelope":{"attack":0.05,"decay":0.2,"sustain":0.2,"release":1}}</textarea>
                    <button class="btn-small" onclick="applyCustomTrack('Bass')">Tetapkan</button>
                </div>
                <textarea id="bassInput">D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n Bb1:8n Bb1:16n Bb1:16n Bb1:8n Bb1:16n Bb1:16n Bb1:8n Bb1:16n Bb1:16n Bb1:8n Bb1:16n Bb1:16n C2:8n C2:16n C2:16n C2:8n C2:16n C2:16n C2:8n C2:16n C2:16n C2:8n C2:16n C2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n D2:8n D2:16n D2:16n Bb1:8n Bb1:16n Bb1:16n Bb1:8n Bb1:16n Bb1:16n Bb1:8n Bb1:16n Bb1:16n Bb1:8n Bb1:16n Bb1:16n A1:8n A1:16n A1:16n A1:8n A1:16n A1:16n A1:8n A1:16n A1:16n A1:8n A1:16n A1:16n</textarea>
            </div>

            <!-- 4. Drums -->
            <div class="track">
                <div class="track-header">
                    <label>🥁 Drums</label>
                    <select class="track-select" id="presetDrum" onchange="changeTrackTheme('Drum')">
                        <option value="acoustic" selected>Acoustic Kit</option>
                        <option value="8bit">8-Bit Kit</option>
                        <option value="edm">EDM Punch</option>
                        <option value="spooky">Tribal</option>
                        <option value="custom">Custom Kit (JSON)</option>
                    </select>
                </div>
                <div id="customDrum" class="collapsible">
                    <textarea class="json-input" id="jsonDrum">{"kick":{"type":"MembraneSynth","options":{}},"snare":{"type":"NoiseSynth","options":{"noise":{"type":"white"},"envelope":{"decay":0.2}}},"hihat":{"type":"MetalSynth","options":{"frequency":200}}}</textarea>
                    <button class="btn-small" onclick="applyCustomTrack('Drum')">Tetapkan</button>
                </div>
                <textarea id="drumInput">K:4n S:8n S:16n S:16n K:4n S:8n S:16n S:16n K:4n S:8n S:16n S:16n K:4n S:16n S:16n S:16n S:16n K:4n S:8n S:16n S:16n K:4n S:8n S:16n S:16n K:4n S:4n K:8n K:8n H:4n K:4n S:8n S:16n S:16n K:4n S:8n S:16n S:16n K:4n S:8n S:16n S:16n K:4n S:16n S:16n S:16n S:16n K:4n S:8n S:16n S:16n K:4n S:8n S:16n S:16n K:4n K:8n K:8n S:16n S:16n S:16n S:16n S:4n</textarea>
            </div>
        </div>

        <p class="hint">Format: <b>Nada:Durasi</b>. Chords: <b>N1,N2:Dur</b>. Drum: <b>K</b> (Kick), <b>S</b> (Snare), <b>H</b> (Hi-hat), <b>_</b> (Jeda). Pemisah diketik pakai Spasi.</p>

        <button class="btn-play" onclick="playMusic()">▶ PUTAR MULTI-TRACK</button>
        <div id="status" class="status">Siap memainkan musik...</div>
    </div>

    <script>
        // --- MASTER SYSTEM ---
        const limiter = new Tone.Limiter(-1).toDestination();
        const masterVolume = new Tone.Volume(-5).connect(limiter);

        function changeVolume() {
            const vol = document.getElementById('masterVolume').value;
            masterVolume.volume.value = parseFloat(vol);
            document.getElementById('volLabel').innerText = vol + " dB";
        }

        // --- TRACK SYNTHS STATE ---
        const trackSynths = {
            Melody: { synth: null, effects: [] },
            Chord: { synth: null, effects: [] },
            Bass: { synth: null, effects: [] },
            Drum: { kick: null, snare: null, hihat: null }
        };

        // --- PRESETS ---
        // Basic synths mapping for Melody/Chord/Bass
        const presets = {
            default: {
                synthOptions: { oscillator: { type: "triangle" }, envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.5 } },
                createEffects: () => [new Tone.Reverb({ decay: 2, wet: 0.4 })]
            },
            medieval: {
                synthOptions: { oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.2, release: 0.2 } },
                createEffects: () => [new Tone.Reverb({ decay: 2, wet: 0.3 })]
            },
            scifi: {
                synthOptions: { oscillator: { type: "fatsawtooth", count: 3, spread: 20 }, envelope: { attack: 0.2, decay: 0.3, sustain: 0.5, release: 1 } },
                createEffects: () => [new Tone.FeedbackDelay("8n", 0.4), new Tone.Reverb({ decay: 3, wet: 0.5 })]
            },
            lofi: {
                synthOptions: { oscillator: { type: "sine" }, envelope: { attack: 0.05, decay: 0.3, sustain: 0.4, release: 0.8 } },
                createEffects: () => [new Tone.Filter(800, "lowpass"), new Tone.Chorus(4, 2.5, 0.5).start(), new Tone.Reverb({ decay: 1.5, wet: 0.4 })]
            },
            '8bit': {
                synthOptions: { oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.1 } },
                createEffects: () => [] // Suara kering retro
            },
            cinematic: {
                synthOptions: { oscillator: { type: "sawtooth" }, envelope: { attack: 0.3, decay: 1, sustain: 0.6, release: 1.5 } },
                createEffects: () => [new Tone.Chorus(2, 2.5, 0.5).start(), new Tone.Reverb({ decay: 5, wet: 0.6 })]
            },
            musicbox: {
                synthOptions: { oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.8 } },
                createEffects: () => [new Tone.PitchShift({ pitch: 12 }), new Tone.Reverb({ decay: 3, wet: 0.5 })]
            },
            cyberpunk: {
                synthOptions: { oscillator: { type: "fatsquare" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.3, release: 0.3 } },
                createEffects: () => [new Tone.Distortion(0.5), new Tone.Filter(2000, "lowpass"), new Tone.Reverb({ decay: 0.5, wet: 0.2 })]
            },
            spooky: {
                synthOptions: { oscillator: { type: "sine" }, envelope: { attack: 0.5, decay: 0.5, sustain: 0.5, release: 1 } },
                createEffects: () => [new Tone.Vibrato(5, 0.5).start(), new Tone.Reverb({ decay: 5, wet: 0.7 })]
            }
        };

        // Drum Presets mapping
        const drumKits = {
            acoustic: {
                kick: { type: 'MembraneSynth', options: { pitchDecay: 0.05, octaves: 4, envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 } } },
                snare: { type: 'NoiseSynth', options: { noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.2, sustain: 0 } } },
                hihat: { type: 'MetalSynth', options: { frequency: 200, envelope: { attack: 0.001, decay: 0.05, release: 0.01 }, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5 } }
            },
            '8bit': {
                kick: { type: 'Synth', options: { oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } } },
                snare: { type: 'NoiseSynth', options: { noise: { type: 'brown' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0 } } },
                hihat: { type: 'NoiseSynth', options: { noise: { type: 'white' }, envelope: { attack: 0.01, decay: 0.02, sustain: 0 } } }
            },
            edm: {
                kick: { type: 'MembraneSynth', options: { pitchDecay: 0.1, octaves: 8, envelope: { attack: 0.001, decay: 0.8, sustain: 0, release: 1.5 } } },
                snare: { type: 'NoiseSynth', options: { noise: { type: 'pink' }, envelope: { attack: 0.001, decay: 0.3, sustain: 0 } } },
                hihat: { type: 'MetalSynth', options: { frequency: 800, envelope: { attack: 0.001, decay: 0.1, release: 0.1 } } }
            },
            spooky: { // tribal
                kick: { type: 'MembraneSynth', options: { pitchDecay: 0.2, octaves: 1.5, envelope: { attack: 0.001, decay: 0.8, sustain: 0, release: 1.5 } } },
                snare: { type: 'MembraneSynth', options: { pitchDecay: 0.01, octaves: 2, envelope: { attack: 0.01, decay: 0.3 } } },
                hihat: { type: 'MetalSynth', options: { frequency: 1500, envelope: { attack: 0.001, decay: 0.1 } } }
            }
        };

        // --- THEME MANAGEMENT ---
        function disposeTrack(tName) {
            if (tName === 'Drum') {
                if (trackSynths.Drum.kick) trackSynths.Drum.kick.dispose();
                if (trackSynths.Drum.snare) trackSynths.Drum.snare.dispose();
                if (trackSynths.Drum.hihat) trackSynths.Drum.hihat.dispose();
                trackSynths.Drum = { kick: null, snare: null, hihat: null };
            } else {
                if (trackSynths[tName].synth) trackSynths[tName].synth.dispose();
                if (trackSynths[tName].effects) trackSynths[tName].effects.forEach(fx => fx.dispose());
                trackSynths[tName] = { synth: null, effects: [] };
            }
        }

        function createDrumSynths(config) {
            const createPart = (partConfig) => {
                if (!partConfig) return new Tone.MembraneSynth().connect(masterVolume);
                const SynthClass = Tone[partConfig.type] || Tone.MembraneSynth;
                return new SynthClass(partConfig.options).connect(masterVolume);
            };
            return {
                kick: createPart(config.kick),
                snare: createPart(config.snare),
                hihat: createPart(config.hihat)
            };
        }

        function applyPresetTrack(trackName, themeName) {
            disposeTrack(trackName);

            if (trackName === 'Drum') {
                const kit = drumKits[themeName] || drumKits['acoustic'];
                trackSynths.Drum = createDrumSynths(kit);
            } else {
                const preset = presets[themeName] || presets['default'];
                trackSynths[trackName].effects = preset.createEffects();
                
                // Mencegah max polyphony berlebih agar CPU / memori Tone.js tidak meledak
                let polyConfig = Object.assign({}, preset.synthOptions, { maxPolyphony: trackName === 'Chord' ? 4 : 2 });
                trackSynths[trackName].synth = new Tone.PolySynth(Tone.Synth, polyConfig);
                trackSynths[trackName].synth.volume.value = -3; // Mencegah distorsi per-track
                
                if (trackSynths[trackName].effects.length > 0) {
                    trackSynths[trackName].synth.chain(...trackSynths[trackName].effects, masterVolume);
                } else {
                    trackSynths[trackName].synth.connect(masterVolume);
                }
            }
        }

        function changeTrackTheme(trackName) {
            const themeNode = document.getElementById('preset' + trackName);
            const theme = themeNode.value;
            const customDiv = document.getElementById('custom' + trackName);

            if (theme === 'custom') {
                customDiv.style.display = 'block';
                applyCustomTrack(trackName);
            } else {
                customDiv.style.display = 'none';
                applyPresetTrack(trackName, theme);
            }
        }

        function applyCustomTrack(trackName) {
            try {
                const jsonText = document.getElementById('json' + trackName).value;
                const options = JSON.parse(jsonText);
                
                disposeTrack(trackName);
                
                if (trackName === 'Drum') {
                    trackSynths.Drum = createDrumSynths(options);
                } else {
                    trackSynths[trackName].effects = [new Tone.Reverb({ decay: 2, wet: 0.3 })];
                    trackSynths[trackName].synth = new Tone.PolySynth(Tone.Synth, options);
                    trackSynths[trackName].synth.chain(...trackSynths[trackName].effects, masterVolume);
                }
                
                const status = document.getElementById('status');
                status.innerText = "Custom preset " + trackName + " berhasil ditetapkan!";
                status.style.color = "#00d2ff";
            } catch (e) {
                console.error("JSON Error:", e);
                const status = document.getElementById('status');
                status.innerText = "Error " + trackName + ": Format JSON tidak valid!";
                status.style.color = "#ff4d6d";
            }
        }

        // Initialize defaults
        applyPresetTrack('Melody', 'cinematic');
        applyPresetTrack('Chord', 'cinematic');
        applyPresetTrack('Bass', 'cyberpunk');
        applyPresetTrack('Drum', 'acoustic');

        // --- PLAYBACK SYSTEM ---
        async function playMusic() {
            await Tone.start();

            const status = document.getElementById('status');
            status.style.color = "#00d2ff";

            const melodyInput = document.getElementById('melodyInput').value.trim();
            const chordInput = document.getElementById('chordInput').value.trim();
            const bassInput = document.getElementById('bassInput').value.trim();
            const drumInput = document.getElementById('drumInput').value.trim();

            if (!melodyInput && !chordInput && !bassInput && !drumInput) {
                status.innerText = "Semua input kosong!";
                return;
            }

            status.innerText = "Sedang memutar musik...";

            const startPlaybackTime = Tone.now() + 0.2;
            let maxDuration = 0;

            function scheduleTrack(inputString, trackName) {
                if (!inputString) return 0;
                const notes = inputString.split(/\s+/);
                let time = startPlaybackTime;

                notes.forEach((item) => {
                    const parts = item.split(':');
                    let notePart = parts[0];
                    let duration = parts[1] || "4n";

                    if (notePart !== "_") { 
                        try {
                            if (trackName === 'Drum') {
                                if (notePart.toUpperCase() === 'K') {
                                    trackSynths.Drum.kick.triggerAttackRelease("C1", "8n", time);
                                } else if (notePart.toUpperCase() === 'S') {
                                    trackSynths.Drum.snare.triggerAttackRelease("16n", time);
                                } else if (notePart.toUpperCase() === 'H') {
                                    trackSynths.Drum.hihat.triggerAttackRelease("32n", time);
                                }
                            } else {
                                const synthObj = trackSynths[trackName].synth;
                                if (trackName === 'Chord' || notePart.includes(',')) {
                                    const chordNotes = notePart.split(',');
                                    synthObj.triggerAttackRelease(chordNotes, duration, time);
                                } else {
                                    synthObj.triggerAttackRelease(notePart, duration, time);
                                }
                            }
                        } catch (e) {
                            console.error(`Error play pada ${trackName}:`, item, e);
                        }
                    }
                    
                    try {
                        time += Tone.Time(duration).toSeconds();
                    } catch(e) {}
                });

                return time - startPlaybackTime;
            }

            const dur1 = scheduleTrack(melodyInput, 'Melody');
            const dur2 = scheduleTrack(chordInput, 'Chord');
            const dur3 = scheduleTrack(bassInput, 'Bass');
            const dur4 = scheduleTrack(drumInput, 'Drum');

            maxDuration = Math.max(dur1, dur2, dur3, dur4);

            setTimeout(() => {
                status.innerText = "Selesai diputar.";
            }, maxDuration * 1000);
        }
    </script>
